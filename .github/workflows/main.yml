name: 🥇 XAUUSD Trading Alert - Auto Signal Check

on:
  schedule:
    # ✅ Cron setiap 10 menit (GitHub minimum 5 menit)
    - cron: '*/10 * * * *'
  
  # Manual trigger untuk testing
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force signal check regardless of market hours'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-signal:
    name: 📊 Analyze XAUUSD Signal
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Batas 8 menit agar tidak overlap

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance==0.2.37 \
            pandas==2.1.4 \
            numpy==1.26.2 \
            ta==0.11.0 \
            requests==2.31.0 \
            python-dotenv==1.0.0 \
            pytz==2024.1

      - name: 🔍 Run Signal Analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_CHECK: ${{ github.event.inputs.force_check || 'false' }}
        run: |
          python src/signal_engine.py

      - name: 📝 Upload Signal Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-log-${{ github.run_number }}
          path: logs/
          retention-days: 7
