name: XAU/USD Alert System v3.0

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: alert atau daily-summary'
        required: false
        default: 'alert'

jobs:
  # ─── JOB 1: Signal Alert (dipicu oleh cron-job.org setiap 10 menit) ────────
  signal-alert:
    name: Signal Alert
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.mode == 'alert' || github.event.inputs.mode == '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Signal Engine — Alert Mode
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          STATE_GIST_ID:      ${{ secrets.STATE_GIST_ID }}
          GH_PAT_GIST:        ${{ secrets.GH_PAT_GIST }}
        run: python src/signal_engine.py --mode alert

  # ─── JOB 2: Daily Summary (dipicu oleh cron-job.org jam 21:00 UTC) ─────────
  daily-summary:
    name: Daily Summary
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.mode == 'daily-summary' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Signal Engine — Daily Summary Mode
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          STATE_GIST_ID:      ${{ secrets.STATE_GIST_ID }}
          GH_PAT_GIST:        ${{ secrets.GH_PAT_GIST }}
        run: python src/signal_engine.py --mode daily-summary
