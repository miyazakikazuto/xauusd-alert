name: Multi-Asset Alert System v3.2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: alert atau daily-summary'
        required: false
        default: 'alert'
        type: choice
        options:
          - alert
          - daily-summary
      symbol:
        description: 'Symbol: xau atau btc'
        required: false
        default: 'xau'
        type: choice
        options:
          - xau
          - btc

concurrency:
  # Kunci per-symbol: signal-alert dan daily-summary untuk symbol yang sama
  # tidak akan pernah menulis ke Gist secara bersamaan. Run baru MENUNGGU
  # (bukan cancel) run lama selesai — supaya tidak ada alert yang terpotong
  # di tengah proses.
  group: signal-engine-${{ github.event.inputs.symbol || 'xau' }}
  cancel-in-progress: false

jobs:
  # ─── JOB 1: Signal Alert (dipicu oleh cron-job.org setiap 10 menit) ────────
  signal-alert:
    name: Signal Alert
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.inputs.mode == 'alert' || github.event.inputs.mode == '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Signal Engine — Alert Mode
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          STATE_GIST_ID:      ${{ secrets.STATE_GIST_ID }}
          GH_PAT_GIST:        ${{ secrets.GH_PAT_GIST }}
        run: python src/signal_engine.py --mode alert --symbol "${{ github.event.inputs.symbol || 'xau' }}"

  # ─── JOB 2: Daily Summary (dipicu oleh cron-job.org jam 21:00 UTC) ─────────
  daily-summary:
    name: Daily Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.inputs.mode == 'daily-summary' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Signal Engine — Daily Summary Mode
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          STATE_GIST_ID:      ${{ secrets.STATE_GIST_ID }}
          GH_PAT_GIST:        ${{ secrets.GH_PAT_GIST }}
        run: python src/signal_engine.py --mode daily-summary --symbol "${{ github.event.inputs.symbol || 'xau' }}"
